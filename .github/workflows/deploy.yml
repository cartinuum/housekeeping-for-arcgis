name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set BASE_PATH for Vite
        id: vite-base
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "${OWNER}.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$NAME/" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - run: npm run lint

      - run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.vite-base.outputs.path }}
          VITE_ARCGIS_CLIENT_ID: ${{ vars.VITE_ARCGIS_CLIENT_ID }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
